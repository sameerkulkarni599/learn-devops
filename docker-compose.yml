version: "3.8"

services:
  # Your Node.js app
  app:
    build: .
    ports:
      - "3002:3000"
    environment:
      - MONGO_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
    depends_on:
      - mongo
    restart: always

  # MongoDB database
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    restart: always

# Named volume to persist database data
volumes:
  mongo-data:
